<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURUSD Trading Simulator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1><span class="neon-blue">EURUSD</span> Simulator</h1>
                <p>Machine Learning Trading Backtester</p>
            </div>
        </header>

        <div class="main-content">
            <!-- Sidebar Configuration -->
            <aside class="config-panel glass-panel">
                <h2>Configuration</h2>
                <form id="sim-form">
                    <div class="form-group">
                        <label for="capital">Initial Capital (USD)</label>
                        <input type="number" id="capital" value="100000" min="1000" step="1000">
                    </div>

                    <div class="form-group">
                        <label for="trade_size">Trade Size (USD Unit)</label>
                        <input type="number" id="trade_size" value="100000" min="1000" step="1000">
                    </div>

                    <div class="form-group">
                        <label for="start_date">Start Date & Time</label>
                        <input type="datetime-local" id="start_date" min="{{ min_date }}" max="{{ max_date }}"
                            value="2024-01-01T00:00">
                    </div>

                    <div class="form-group">
                        <label for="range_hours">Duration (Hours)</label>
                        <input type="number" id="range_hours" value="720" min="1" max="8760">
                    </div>

                    <div class="form-group">
                        <label for="strategy">Trading Strategy</label>
                        <select id="strategy">
                            <option value="1">Strategy 1 (Always-On Direction)</option>
                            <option value="2">Strategy 2 (Selective Confidence)</option>
                        </select>
                    </div>

                    <!-- Additional Options for Strategy 2 -->
                    <div id="strat2-options" class="hidden grouped-options">
                        <div class="form-group">
                            <label for="lower">Lower Threshold (Short)</label>
                            <input type="number" id="lower" value="0.45" step="0.01" min="0" max="1">
                        </div>
                        <div class="form-group">
                            <label for="upper">Upper Threshold (Long)</label>
                            <input type="number" id="upper" value="0.55" step="0.01" min="0" max="1">
                        </div>
                        <div class="form-group checkbox-group">
                            <input type="checkbox" id="vol_filter" checked>
                            <label for="vol_filter">Enable Volatility Filter</label>
                        </div>
                    </div>

                    <button type="submit" class="btn-run" id="btn-run">Run Simulation</button>
                    <div id="loading" class="hidden spinner">Loading...</div>
                </form>
            </aside>

            <!-- Dashboard Results -->
            <main class="dashboard">
                <div class="kpi-grid">
                    <div class="kpi-card glass-panel">
                        <h3>Final Equity</h3>
                        <p id="kpi-equity" class="kpi-value">---</p>
                    </div>
                    <div class="kpi-card glass-panel">
                        <h3>Net PnL</h3>
                        <p id="kpi-pnl" class="kpi-value">---</p>
                    </div>
                    <div class="kpi-card glass-panel">
                        <h3>Win Rate</h3>
                        <p id="kpi-winrate" class="kpi-value">---</p>
                    </div>
                    <div class="kpi-card glass-panel">
                        <h3>Total Trades</h3>
                        <p id="kpi-trades" class="kpi-value">---</p>
                    </div>
                </div>

                <div class="chart-container glass-panel">
                    <h3>Equity Curve</h3>
                    <canvas id="equityChart"></canvas>
                </div>

                <div class="chart-container glass-panel">
                    <h3>Prediction P(up) vs Actual Returns</h3>
                    <canvas id="predictionChart"></canvas>
                </div>
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
